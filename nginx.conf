# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf  —  NotesAPI reverse proxy configuration
#
# What nginx does here:
#   • Listens on port 80 (public internet)
#   • Forwards all traffic to Uvicorn running on localhost:8000
#   • Adds security headers and enables gzip compression
#   • Handles WebSocket upgrades (useful if you add live features later)
#
# How to use:
#   1. Install nginx:  sudo apt install nginx
#   2. Copy this file: sudo cp nginx.conf /etc/nginx/sites-available/notesapi
#   3. Enable it:      sudo ln -s /etc/nginx/sites-available/notesapi /etc/nginx/sites-enabled/
#   4. Test config:    sudo nginx -t
#   5. Reload nginx:   sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Compresses responses to reduce bandwidth usage.
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/html;
    gzip_min_length 256;

    # ── Upstream: our FastAPI app ─────────────────────────────────────────────
    upstream notesapi {
        server 127.0.0.1:8000;
        keepalive 32;               # reuse connections to Uvicorn
    }

    server {
        listen 80;
        server_name _;              # replace _ with your domain or ngrok URL

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-Frame-Options          "DENY"            always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "no-referrer"     always;

        # ── Max upload size (for future file-attach features) ─────────────────
        client_max_body_size 10M;

        # ── Proxy all requests to FastAPI ─────────────────────────────────────
        location / {
            proxy_pass         http://notesapi;
            proxy_http_version 1.1;

            # Pass the real client IP so FastAPI logs can see it
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (Upgrade + Connection headers)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Timeouts
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }

        # ── Health check endpoint (bypass proxy for load balancer pings) ──────
        location /health {
            proxy_pass http://notesapi/health;
        }
    }
}
